services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=credit-ms'
      - 'POSTGRES_PASSWORD=1234'
      - 'POSTGRES_USER=mota'
    ports:
      - '5432:5432'

  rabbitmq:
    image: 'rabbitmq:3-management'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=1234'
      - 'RABBITMQ_DEFAULT_USER=mota'
    ports:
      - '5672:5672'
      - '15672:15672'
  redis:
    image: 'redis:latest'
    ports:
      - '6379:6379'